<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F.R.I.D.A.Y. — CORE</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #111118;
      --border: #1e1e2e;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
      --red: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
    }

    .branch-label {
      background: var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--accent);
    }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* LEFT — VOICE PANEL */
    .voice-panel {
      width: 340px;
      min-width: 300px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .panel-header {
      padding: 14px 18px;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* FRIDAY AVATAR */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 20px;
      gap: 12px;
    }

    .avatar-ring {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
    }

    .avatar-ring.speaking {
      animation: ring-pulse 1s ease-in-out infinite;
      border-color: var(--accent);
    }

    .avatar-ring.listening {
      border-color: var(--red);
      box-shadow: 0 0 20px rgba(239,68,68,0.3);
      animation: ring-pulse 0.5s ease-in-out infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,212,255,0.2); }
      50% { box-shadow: 0 0 35px rgba(0,212,255,0.5); }
    }

    .avatar-inner {
      font-size: 36px;
    }

    .friday-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .friday-status {
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
    }

    /* WAVEFORM */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
      padding: 0 20px;
    }

    .wave-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 3px;
      height: 4px;
      transition: height 0.1s;
    }

    .waveform.active .wave-bar {
      animation: wave 0.8s ease-in-out infinite;
    }

    .wave-bar:nth-child(2) { animation-delay: 0.1s; }
    .wave-bar:nth-child(3) { animation-delay: 0.2s; }
    .wave-bar:nth-child(4) { animation-delay: 0.3s; }
    .wave-bar:nth-child(5) { animation-delay: 0.2s; }
    .wave-bar:nth-child(6) { animation-delay: 0.1s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50% { height: 28px; }
    }

    /* MIC BUTTON */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px 20px 20px;
    }

    .mic-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: white;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mic-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(124,58,237,0.6); }
    .mic-btn.active { background: linear-gradient(135deg, var(--red), #f97316); box-shadow: 0 4px 15px rgba(239,68,68,0.5); }
    .mic-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .mic-hint { font-size: 11px; color: var(--muted); }

    /* TRANSCRIPT */
    .transcript-section {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transcript-section::-webkit-scrollbar { width: 4px; }
    .transcript-section::-webkit-scrollbar-track { background: transparent; }
    .transcript-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 100%;
    }

    .message.user {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      align-self: flex-end;
      color: #c4b5fd;
    }

    .message.friday {
      background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      color: var(--text);
    }

    .message-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: var(--muted);
    }

    .message.friday .message-label { color: var(--accent); }
    .message.user .message-label { color: #a78bfa; }

    /* TEXT INPUT */
    .text-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .text-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }

    .text-input:focus { border-color: var(--accent); }

    .send-btn {
      background: var(--accent2);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    .send-btn:hover { background: #6d28d9; }

    /* RIGHT — CODE EDITOR */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-tabs {
      display: flex;
      align-items: center;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover { color: var(--text); }

    .tab-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: var(--border);
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--text);
      font-size: 11px;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.5px;
    }

    .action-btn:hover { background: var(--accent2); }
    .action-btn.commit { background: rgba(16,185,129,0.2); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
    .action-btn.commit:hover { background: rgba(16,185,129,0.4); }

    .editor-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    textarea#code-editor {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: #a8d8a8;
      font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 20px;
      border: none;
      outline: none;
      resize: none;
      tab-size: 2;
    }

    /* FRIDAY TYPING INDICATOR */
    .friday-typing {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--accent);
    }

    .friday-typing.visible { display: flex; }

    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* BOTTOM BAR */
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 20px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .bottombar-left { display: flex; gap: 16px; }
    .bottombar-right { display: flex; gap: 16px; align-items: center; }
    .accent { color: var(--accent); }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="status-dot" id="status-dot"></div>
    <div class="logo">F.R.I.D.A.Y.</div>
    <div class="status-text" id="status-text">SYSTEM ONLINE</div>
  </div>
  <div class="topbar-right">
    <span>sharaam / FRIDAY-CORE</span>
    <span class="branch-label" id="branch-label">main</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- VOICE PANEL -->
  <div class="voice-panel">
    <div class="panel-header">Voice Interface</div>

    <div class="avatar-section">
      <div class="avatar-ring" id="avatar-ring">
        <div class="avatar-inner">🤖</div>
      </div>
      <div class="friday-name">MAEVE</div>
      <div class="friday-status" id="friday-status">Standing by, Boss.</div>
    </div>

    <div class="waveform" id="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="mic-section">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <div class="mic-hint" id="mic-hint">Hold to speak</div>
    </div>

    <div class="friday-typing" id="friday-typing">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span style="margin-left:4px">FRIDAY is thinking...</span>
    </div>

    <div class="transcript-section" id="transcript"></div>

    <div class="text-input-row">
      <input class="text-input" id="text-input" placeholder="Or type here, Boss..." onkeydown="handleKey(event)" />
      <button class="send-btn" onclick="sendText()">➤</button>
    </div>
  </div>

  <!-- CODE EDITOR -->
  <div class="editor-panel">
    <div class="editor-tabs">
      <div class="tab active" onclick="switchTab(this, 'main')" data-file="collab/friday-engine.js">friday-engine.js</div>
      <div class="tab" onclick="switchTab(this, 'voice')" data-file="voice/tts.js">tts.js</div>
      <div class="tab" onclick="switchTab(this, 'config')" data-file="config/friday.config.js">friday.config.js</div>
      <div class="tab-actions">
        <button class="action-btn" onclick="loadFromGithub()">↓ Pull</button>
        <button class="action-btn commit" onclick="commitToGithub()">↑ Commit</button>
      </div>
    </div>

    <div class="editor-wrapper">
      <textarea id="code-editor" spellcheck="false" placeholder="// FRIDAY is ready to code alongside you, Boss..."></textarea>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <div class="bottombar-left">
    <span>Voice: <span class="accent">Maeve</span></span>
    <span>Model: <span class="accent">eleven_multilingual_v2</span></span>
    <span id="token-status">ElevenLabs: <span class="accent">Connected</span></span>
  </div>
  <div class="bottombar-right">
    <span id="char-count">0 chars</span>
    <span id="last-commit">No commits yet</span>
  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────
  const VOICE_ID = 'kOvUpYLYS0rKGldsKcD1'; // Maeve
  const ELEVEN_KEY = ''; // Injected server-side in production
  const GITHUB_REPO = 'sharaam/FRIDAY-CORE';

  // ─── STATE ────────────────────────────────────────────
  let isListening = false;
  let isSpeaking = false;
  let recognition = null;
  let currentFile = 'collab/friday-engine.js';

  // ─── INIT ─────────────────────────────────────────────
  window.onload = () => {
    setupSpeechRecognition();
    updateCharCount();
    addMessage('friday', 'Systems online. Ready to code, Boss. Speak or type your command.');
  };

  // ─── SPEECH RECOGNITION ───────────────────────────────
  function setupSpeechRecognition() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      document.getElementById('mic-hint').textContent = 'Voice not supported in this browser';
      document.getElementById('mic-btn').disabled = true;
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = 'en-IE';

    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      stopListening();
      addMessage('user', transcript);
      processFridayResponse(transcript);
    };

    recognition.onerror = () => stopListening();
    recognition.onend = () => stopListening();
  }

  function toggleMic() {
    if (isListening) stopListening();
    else startListening();
  }

  function startListening() {
    if (!recognition) return;
    isListening = true;
    recognition.start();
    setAvatar('listening');
    document.getElementById('mic-btn').classList.add('active');
    document.getElementById('mic-btn').textContent = '⏹';
    document.getElementById('mic-hint').textContent = 'Listening...';
    document.getElementById('friday-status').textContent = 'Listening, Boss...';
    document.getElementById('waveform').classList.add('active');
  }

  function stopListening() {
    if (!recognition) return;
    isListening = false;
    try { recognition.stop(); } catch(_) {}
    setAvatar('idle');
    document.getElementById('mic-btn').classList.remove('active');
    document.getElementById('mic-btn').textContent = '🎤';
    document.getElementById('mic-hint').textContent = 'Hold to speak';
    document.getElementById('friday-status').textContent = 'Standing by, Boss.';
    document.getElementById('waveform').classList.remove('active');
  }

  // ─── FRIDAY RESPONSE ENGINE ───────────────────────────
  async function processFridayResponse(userInput) {
    showTyping(true);
    setStatus('PROCESSING...');

    const lower = userInput.toLowerCase();
    let response = '';
    let codeAction = null;

    // Command detection
    if (lower.includes('read') || lower.includes('load') || lower.includes('show')) {
      response = `Loading ${currentFile} from the repo now, Boss.`;
      codeAction = 'load';
    } else if (lower.includes('commit') || lower.includes('save') || lower.includes('push')) {
      response = `Committing current code to a new FRIDAY branch. Standing by.`;
      codeAction = 'commit';
    } else if (lower.includes('hello') || lower.includes('hey') || lower.includes('friday')) {
      response = `Online and at full capacity, Boss. What are we building?`;
    } else if (lower.includes('status') || lower.includes('report')) {
      response = `All systems nominal. Voice layer: online. GitHub: connected. Code editor: active. Ready for your command.`;
    } else if (lower.includes('clear')) {
      document.getElementById('transcript').innerHTML = '';
      response = `Transcript cleared. Clean slate, Boss.`;
    } else {
      response = `Understood, Boss. Processing: "${userInput}". Full AI integration coming in the next build. Right now I'm running on pattern recognition — the ElevenLabs + AI backend deploys next phase.`;
    }

    showTyping(false);
    addMessage('friday', response);

    // Execute code actions
    if (codeAction === 'load') loadFromGithub();
    if (codeAction === 'commit') commitToGithub();

    // Speak the response via ElevenLabs
    await fridaySpeak(response);
  }

  // ─── TTS — FRIDAY SPEAKS ──────────────────────────────
  async function fridaySpeak(text) {
    if (!ELEVEN_KEY) {
      // Fallback to browser TTS if no key
      if ('speechSynthesis' in window) {
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'en-IE';
        utt.rate = 0.95;
        utt.pitch = 1.05;
        window.speechSynthesis.speak(utt);
        setAvatar('speaking');
        utt.onend = () => setAvatar('idle');
      }
      return;
    }

    try {
      setAvatar('speaking');
      document.getElementById('friday-status').textContent = 'Speaking...';
      document.getElementById('waveform').classList.add('active');

      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
        method: 'POST',
        headers: {
          'xi-api-key': ELEVEN_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          text,
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.5, similarity_boost: 0.85, style: 0.3, use_speaker_boost: true }
        })
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
      audio.onended = () => {
        setAvatar('idle');
        document.getElementById('friday-status').textContent = 'Standing by, Boss.';
        document.getElementById('waveform').classList.remove('active');
      };
    } catch(e) {
      setAvatar('idle');
      console.error('TTS error:', e);
    }
  }

  // ─── GITHUB INTEGRATION ───────────────────────────────
  async function loadFromGithub() {
    setStatus('PULLING FROM GITHUB...');
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${currentFile}`);
      const data = await res.json();
      const content = atob(data.content.replace(/\n/g,''));
      document.getElementById('code-editor').value = content;
      updateCharCount();
      setStatus('SYSTEM ONLINE');
      addMessage('friday', `Loaded ${currentFile} from GitHub. ${content.split('\n').length} lines, Boss.`);
    } catch(e) {
      addMessage('friday', `Could not load file from GitHub, Boss. Check the connection.`);
      setStatus('SYSTEM ONLINE');
    }
  }

  async function commitToGithub() {
    const code = document.getElementById('code-editor').value;
    if (!code.trim()) {
      addMessage('friday', `Nothing to commit, Boss. Editor is empty.`);
      return;
    }
    addMessage('friday', `Commit queued. In production I'll push directly to a FRIDAY branch. API key injection needed for write access.`);
    document.getElementById('last-commit').textContent = `Last: ${new Date().toLocaleTimeString()}`;
  }

  // ─── UI HELPERS ───────────────────────────────────────
  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const label = role === 'friday' ? 'F.R.I.D.A.Y.' : 'BOSS';
    div.innerHTML = `<div class="message-label">${label}</div>${text}`;
    const t = document.getElementById('transcript');
    t.appendChild(div);
    t.scrollTop = t.scrollHeight;
  }

  function setAvatar(state) {
    const ring = document.getElementById('avatar-ring');
    ring.className = 'avatar-ring';
    if (state !== 'idle') ring.classList.add(state);
  }

  function showTyping(show) {
    document.getElementById('friday-typing').className = `friday-typing${show ? ' visible' : ''}`;
  }

  function setStatus(text) {
    document.getElementById('status-text').textContent = text;
  }

  function switchTab(el, key) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentFile = el.dataset.file;
  }

  function handleKey(e) {
    if (e.key === 'Enter') sendText();
  }

  function sendText() {
    const input = document.getElementById('text-input');
    const val = input.value.trim();
    if (!val) return;
    input.value = '';
    addMessage('user', val);
    processFridayResponse(val);
  }

  function updateCharCount() {
    const len = document.getElementById('code-editor').value.length;
    document.getElementById('char-count').textContent = `${len} chars`;
  }

  document.getElementById('code-editor').addEventListener('input', updateCharCount);
</script>
</body>
</html>
